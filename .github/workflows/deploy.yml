name: Deploy to PRO ISP VPS

on:
  push:
    branches:
      - main  # Trigger distribusjon hver gang du pusher til main-branchen

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Henter koden fra GitHub-repositoriet
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Konfigurerer SSH-nøkkelen på GitHub-runneren
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      # 3. Synkroniserer filene til VPS-en med rsync
      - name: Deploy files via rsync
        run: |
          rsync -avzr --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='node_modules' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/tnjensen.com
