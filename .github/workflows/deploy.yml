name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Gå til riktig mappe eller klon på nytt hvis den er tom
            if [ ! -d "/var/www/tnjensen.com" ] || [ -z "$(ls -A /var/www/tnjensen.com)" ]; then
              git clone https://github.com /var/www/tnjensen.com
              cd /var/www/tnjensen.com
            else
              cd /var/www/tnjensen.com
              git pull origin main
            fi

            # 2. Installer avhengigheter og bygg
            npm install
            npm run build

            # 3. Kopier statiske filer til standalone-mappen
            cp -r /var/www/tnjensen.com /var/www/tnjensen.com
            cp -r /var/www/tnjensen.com /var/www/tnjensen.com

            # 4. Slett gammel PM2-historikk og start helt på nytt
            pm2 delete nextjs-standalone || true
            
            cd /var/www/tnjensen.com
            PORT=3000 pm2 start server.js --name "nextjs-standalone"
            pm2 save
